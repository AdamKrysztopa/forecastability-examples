name: Release Handshake

on:
  repository_dispatch:
    types: [core_release]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      core_version:
        description: "Core release version to test against (e.g. 0.4.0)"
        required: false
        default: ""

jobs:
  notebook-matrix:
    name: "Handshake py${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ">=0.5"

      - name: Resolve core version
        id: core-version
        run: |
          set -euo pipefail
          VERSION="${{ github.event.client_payload.version || inputs.core_version }}"
          if [ -z "${VERSION}" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${{ github.event.client_payload.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "pypi_url=${{ github.event.client_payload.pypi_url }}" >> "$GITHUB_OUTPUT"

      - name: Install with specific core version
        run: |
          VERSION="${{ steps.core-version.outputs.version }}"
          uv sync --no-install-project --all-extras
          if [ -n "$VERSION" ]; then
            uv pip install "dependence-forecastability==${VERSION}" --force-reinstall
          fi

      - name: Execute notebooks
        timeout-minutes: 45
        run: |
          set -euo pipefail
          NOTEBOOKS=$(find walkthroughs triage_walkthroughs recipes \
            -name '*.ipynb' 2>/dev/null)
          if [ -z "$NOTEBOOKS" ]; then
            echo "No notebooks to execute — handshake skipped (scaffold only)"
            exit 0
          fi
          uv run jupyter nbconvert \
            --to notebook \
            --execute \
            --inplace \
            --ExecutePreprocessor.timeout=600 \
            $NOTEBOOKS

      - name: Upload executed notebooks as workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "release-notebooks-py${{ matrix.python-version }}-v${{ steps.core-version.outputs.version }}"
          path: |
            walkthroughs/*.ipynb
            triage_walkthroughs/*.ipynb
            recipes/**/*.ipynb
          if-no-files-found: ignore
          retention-days: 90
