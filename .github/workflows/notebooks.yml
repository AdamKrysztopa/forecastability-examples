name: Notebooks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  notebooks:
    name: "py${{ matrix.python-version }} / ${{ matrix.source }}"
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.source == 'unpinned-main' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        source: [pinned, unpinned-main]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ">=0.5"

      - name: Install (pinned source — PyPI)
        if: matrix.source == 'pinned'
        run: uv sync --frozen --no-install-project --all-extras

      - name: Install (unpinned-main — git HEAD)
        if: matrix.source == 'unpinned-main'
        run: |
          uv sync --no-install-project --all-extras
          uv pip install \
            "dependence-forecastability @ git+https://github.com/AdamKrysztopa/dependence-forecastability.git@chore/0-4-0-repos-split" \
            --force-reinstall

      # --- CausalRivers data cache (EX-NB-DATA-02) ---
      # Cache key is the SHA-256 manifest so the parquet is re-fetched only
      # when the upstream data changes.  On a cache miss the fetch step runs.
      - name: Restore CausalRivers parquet cache
        id: causal-rivers-cache
        uses: actions/cache@v4
        with:
          path: data/causal_rivers
          key: causal-rivers-${{ hashFiles('data/causal_rivers/east_germany_8stations_6h.sha256') }}
          restore-keys: |
            causal-rivers-

      - name: Fetch CausalRivers data (cache miss)
        if: steps.causal-rivers-cache.outputs.cache-hit != 'true'
        run: uv run python scripts/download_causal_rivers.py

      - name: Execute unexecuted notebooks
        # scripts/find_unexecuted_notebooks.py prints paths of notebooks whose
        # code cells have no outputs yet. Notebooks committed with outputs are
        # skipped — re-running them in CI is expensive and unnecessary.
        timeout-minutes: 30
        run: |
          UNEXECUTED=$(python3 scripts/find_unexecuted_notebooks.py)
          if [ -z "$UNEXECUTED" ]; then
            echo "All notebooks already have outputs — nothing to execute."
            exit 0
          fi
          echo "Executing unexecuted notebooks:"
          echo "$UNEXECUTED"
          uv run jupyter nbconvert \
            --to notebook \
            --execute \
            --inplace \
            --ExecutePreprocessor.timeout=600 \
            $UNEXECUTED

      - name: Upload executed notebooks as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "executed-notebooks-py${{ matrix.python-version }}-${{ matrix.source }}"
          path: |
            walkthroughs/*.ipynb
            triage_walkthroughs/*.ipynb
            recipes/**/*.ipynb
          if-no-files-found: ignore
          retention-days: 30
